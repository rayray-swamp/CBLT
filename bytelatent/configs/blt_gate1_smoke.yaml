# BLT main model smoke — ゲート① (end-to-end 疎通確認)
# 実エントロピー Arrow を使った entropy patching で本体学習ループが回るか確認

dump_dir: /gs/bs/tga-RLA/yoshida/blt_runs/blt_gate1_smoke
name: "blt_gate1_smoke"
steps: 50
max_steps: null
probe_freq: null
seed: 777

train_entropy_model: false

optim:
  lr: 4e-04
  warmup: 10
  lr_min_ratio: 0.1
  clip: 10.0

distributed:
  fsdp_type: full_shard
  model_dtype: bf16
  matmul_allow_tf32: false
  selective_activation_checkpointing: false
  tp_size: 1

model:
  dim: 512
  dim_global: 512
  dim_local_decoder: 256
  dim_local_encoder: 256
  n_layers: 8
  n_layers_global: 8
  n_layers_local_decoder: 8
  n_layers_local_encoder: 8
  n_heads: 8
  n_heads_global: 8
  n_heads_local_decoder: 8
  n_heads_local_encoder: 8
  max_seqlen: 4096
  max_encoder_seq_length: 12288
  vocab_size: 260
  ffn_dim_multiplier: 1.0
  patch_size: 6.0
  patching_mode: entropy
  patching_threshold: 1.335442066192627
  attn_impl: xformers
  attn_bias_type: block_causal
  local_attention_window_len: 512
  use_local_encoder_transformer: true
  cross_attn_encoder: true
  cross_attn_decoder: true
  cross_attn_all_layers_encoder: true
  cross_attn_all_layers_decoder: true
  cross_attn_init_by_pooling: true
  cross_attn_use_flex_attention: true
  cross_attn_k: 8
  cross_attn_nheads: 4
  cross_attn_window_encoder: 512
  cross_attn_window_decoder: 512
  downsampling_by_pooling: max
  share_encoder_decoder_emb: true
  log_patch_lengths: true

data:
  root_dir: /gs/bs/tga-RLA/yoshida/blt_data/smoke
  preprocess_dir: /gs/bs/tga-RLA/yoshida/blt_data/smoke/preprocess
  entropy_model_name: transformer_100m
  sources:
    fineweb_smoke_shuffled: 1.0
  batch_size: 2
  seq_len: 4096
  max_encoder_seq_length: 12288
  prefetch_size: 64
  load_async: true
  add_patches: true
  add_bos: true
  add_eos: true
  pad_to_max_length: true
  patcher_args:
    patching_mode: entropy
    threshold: 1.335442066192627
    patching_device: cuda
    realtime_patching: false
    entropy_model_checkpoint_dir: null
  tokenizer_args:
    name: blt
    init_kwargs:
      bpe_tokenizer_path: /gs/bs/tga-RLA/yoshida/blt_data/tokenizer/tokenizer.model

profiling:
  run: false

checkpoint:
  dump:
    every: 50
    keep: 1
  eval:
    every: 10000
    keep: -1

logging:
  freq: 10

eval_on_gpus: 1
eval: null
